<!DOCTYPE html>
<html>
<head>
  <title>Cookie Mama</title>
  <style>
    body {
      font-family: Arial;
      background-color: #fff0f5;
      text-align: center;
    }
    h1 {
      color: #d63384;
    }
    .menu {
      margin-top: 30px;
    }
    .item {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      display: inline-block;
      width: 200px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    button {
      background-color: #ff69b4;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🍪 Cookie Mama</h1>
  <p>The sweet bakery that everyone loves 😋</p>

  <div class="menu">
    <div class="item">
      <h3>🧁 Cupcake</h3>
      <p>Soft and delicious</p>
      <button>Order</button>
    </div>

    <div class="item">
      <h3>🍫 Chocolate Cake</h3>
      <p>Rich and creamy</p>
      <button>Order</button>
    </div>

    <div class="item">
      <h3>🥞 Crepes</h3>
      <p>With chocolate or sugar</p>
      <button>Order</button>
    </div>
  </div>

</body>
</html>
