<!DOCTYPE html>
<html>
<head>
  <title>Cookie Mama</title>
  <style>
    body {
      font-family: Arial;
      background-color: #fff0f5;
      text-align: center;
    }

    h1 {
      color: #d63384;
    }

    .menu {
      margin-top: 30px;
    }

    .item {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 15px;
      display: inline-block;
      width: 220px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background-color: #ff69b4;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* Form style */
    #orderForm {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    .form-box {
      background: white;
      padding: 20px;
      width: 300px;
      margin: 100px auto;
      border-radius: 10px;
      text-align: left;
    }

    input, select {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
    }
  </style>
</head>

<body>

  <h1>🍪 Cookie Mama</h1>
  <p>The sweet bakery that everyone loves 😋</p>

  <div class="menu">

    <div class="item">
      <img src="https://images.unsplash.com/photo-1587668178277-295251f900ce">
      <h3>🧁 Cupcake</h3>
      <p>Soft and delicious</p>
      <button onclick="openForm('Cupcake')">Order</button>
    </div>

    <div class="item">
      <img src="https://natashaskitchen.com/wp-content/uploads/2020/08/Chocolate-Brownie-Recipe-5.jpg">
      <h3>🍫 Chocolate Cake</h3>
      <p>Rich and creamy</p>
      <button onclick="openForm('Chocolate Cake')">Order</button>
    </div>

    <div class="item">
      <img src="https://img.cuisineaz.com/680x357/2017/02/06/i120594-crepes-gourmandes.jpeg">
      <h3>🥞 Crepes</h3>
      <p>With chocolate or sugar</p>
      <button onclick="openForm('Crepes')">Order</button>
    </div>

  </div>

  <!-- FORM -->
  <div id="orderForm">
    <div class="form-box">
      <h3 id="productTitle"></h3>

      <input id="name" placeholder="Your name">
      <input id="quantity" placeholder="Quantity">
      <input id="address" placeholder="Delivery address">
      <input id="time" placeholder="Delivery time">

      <select id="payment">
        <option value="Cash">Cash</option>
        <option value="Card">Card</option>
      </select>

      <button onclick="submitOrder()">Confirm</button>
      <button onclick="closeForm()">Cancel</button>
    </div>
  </div>

  <script>
    let currentProduct = "";

    function openForm(product) {
      currentProduct = product;
      document.getElementById("orderForm").style.display = "block";
      document.getElementById("productTitle").innerText = "Order: " + product;
    }

    function closeForm() {
      document.getElementById("orderForm").style.display = "none";
    }

    function submitOrder() {
      let name = document.getElementById("name").value;
      let quantity = document.getElementById("quantity").value;
      let address = document.getElementById("address").value;
      let time = document.getElementById("time").value;
      let payment = document.getElementById("payment").value;

      if (!name || !quantity || !address || !time) {
        alert("Please fill all fields!");
        return;
      }

      alert(
        "Order confirmed!\n\n" +
        "Product: " + currentProduct + "\n" +
        "Name: " + name + "\n" +
        "Quantity: " + quantity + "\n" +
        "Address: " + address + "\n" +
        "Time: " + time + "\n" +
        "Payment: " + payment
      );

      closeForm();
    }
  </script>

</body>
</html>
